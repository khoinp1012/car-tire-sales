name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm run test:ci

      - name: Lint
        run: npx eslint --ext .ts,.tsx . --max-warnings 0

      - name: Native Prebuild Sanity
        run: |
          if [ ! -f google-services.json ]; then
            echo '{"project_info":{"project_number":"1","project_id":"mock-project"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1","android_client_info":{"package_name":"com.toanthang.tiresales"}}}]}' > google-services.json
          fi
          CI=1 npx expo prebuild --platform android --no-install



