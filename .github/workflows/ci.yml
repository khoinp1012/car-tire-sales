name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npm run check

      - name: Run tests
        run: npm run test:ci

      - name: Lint (if configured)
        run: |
          if grep -q "\"eslint\"" package.json || [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.json ]; then
            echo "Running eslint"
            npx eslint --ext .ts,.tsx .
          else
            echo "No eslint configured — skipping lint"
          fi
